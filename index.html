<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="交代制カレンダー">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>勤務シフトカレンダー v4</title>
<style>
body{font-family:-apple-system,sans-serif;margin:10px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
#title{font-size:22px;font-weight:bold}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dow{background:#ddd;text-align:center;padding:6px;font-weight:bold}
.day{border:1px solid #ccc;min-height:100px;padding:4px;cursor:pointer}
.date{font-weight:bold}
.shift{white-space:pre-line;font-size:13px;margin-top:4px}
.s1{background:#dbeeff}.s2{background:#fff5c9}.s3{background:#ffdede}.off{background:#efefef}
.today{outline:3px solid red}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center}
.box{background:#fff;padding:16px;border-radius:10px;min-width:280px}
.choice{display:block;width:100%;margin:8px 0;padding:10px;font-size:16px}
.tools{margin-bottom:10px}
</style>
</head>
<body>

<div class="tools">
<button onclick="resetAll()">設定リセット</button>
</div>

<div class="header">
<button onclick="changeMonth(-1)">◀</button>
<div id="title"></div>
<button onclick="changeMonth(1)">▶</button>
</div>

<div id="calendar" class="calendar"></div>

<div id="modal" class="modal">
<div class="box">
<h3>シフト変更</h3>
<button class="choice" onclick="setWeekShift('1直')">1直 (8:00〜17:00)</button>
<button class="choice" onclick="setWeekShift('2直')">2直 (12:00〜21:00)</button>
<button class="choice" onclick="setWeekShift('3直')">3直 (21:00〜6:00)</button>
<button class="choice" onclick="setDayOff()">休み（その日だけ）</button>
<button class="choice" onclick="clearDayOverride()">休み解除</button>
<button class="choice" onclick="closeModal()">キャンセル</button>
</div>
</div>

<script>
const INFO={
 "1直":"1直\n8:00〜17:00",
 "2直":"2直\n12:00〜21:00",
 "3直":"3直\n21:00〜6:00",
 "休み":"休み"
};

const ORDER=["3直","2直","1直"];
const BASE_SHIFT="2直";
const BASE_DATE=new Date("2026-06-01");

let current=new Date(2026,5,1);
let selectedDate=null;

let weekOverrides=JSON.parse(localStorage.getItem("weekOverrides")||"{}");
let dayOverrides=JSON.parse(localStorage.getItem("dayOverrides")||"{}");

function fmt(d){
 return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function parseDate(str){
 const p=str.split("-");
 return new Date(Number(p[0]), Number(p[1])-1, Number(p[2]));
}

function mondayOf(date){
 let d=new Date(date);
 let day=d.getDay();
 let diff=(day===0?-6:1-day);
 d.setDate(d.getDate()+diff);
 d.setHours(0,0,0,0);
 return d;
}

function nextShift(s){
 if(s==="1直") return "3直";
 if(s==="3直") return "2直";
 return "1直";
}

function shiftFor(date){
 const key=fmt(date);

 if(dayOverrides[key]==="休み") return "休み";

 if(date.getDay()===0 || date.getDay()===6) return "休み";

 const weekKey=fmt(mondayOf(date));

 let startWeek=mondayOf(BASE_DATE);
 let startShift=BASE_SHIFT;

 let latest=null;
 for(const k in weekOverrides){
   if(k<=weekKey && (!latest || k>latest)) latest=k;
 }

 if(latest){
   startWeek=parseDate(latest);
   startShift=weekOverrides[latest];
 }

 let weeks=Math.floor((mondayOf(date)-startWeek)/(1000*60*60*24*7));

 let shift=startShift;
 for(let i=0;i<weeks;i++){
   shift=nextShift(shift);
 }
 return shift;
}

function render(){
 const cal=document.getElementById("calendar");
 cal.innerHTML="";

 document.getElementById("title").textContent=current.getFullYear()+"年 "+(current.getMonth()+1)+"月";

 ["日","月","火","水","木","金","土"].forEach(d=>{
   let e=document.createElement("div");
   e.className="dow";
   e.textContent=d;
   cal.appendChild(e);
 });

 const first=new Date(current.getFullYear(),current.getMonth(),1);
 const last=new Date(current.getFullYear(),current.getMonth()+1,0);

 for(let i=0;i<first.getDay();i++) cal.appendChild(document.createElement("div"));

 for(let d=1;d<=last.getDate();d++){
   const date=new Date(current.getFullYear(),current.getMonth(),d);
   const shift=shiftFor(date);

   let cell=document.createElement("div");
   cell.className="day";

   if(shift==="1直") cell.classList.add("s1");
   if(shift==="2直") cell.classList.add("s2");
   if(shift==="3直") cell.classList.add("s3");
   if(shift==="休み") cell.classList.add("off");

   if(new Date().toDateString()===date.toDateString()) cell.classList.add("today");

   cell.innerHTML=`<div class="date">${d}</div><div class="shift">${INFO[shift]}</div>`;
   cell.onclick=()=>openMenu(date);
   cal.appendChild(cell);
 }
}

function openMenu(date){
 selectedDate=date;
 document.getElementById("modal").style.display="flex";
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

function setWeekShift(shift){
 delete dayOverrides[fmt(selectedDate)];
 localStorage.setItem("dayOverrides",JSON.stringify(dayOverrides));

 const weekKey=fmt(mondayOf(selectedDate));
 weekOverrides[weekKey]=shift;
 localStorage.setItem("weekOverrides",JSON.stringify(weekOverrides));

 closeModal();
 render();
}

function setDayOff(){
 dayOverrides[fmt(selectedDate)]="休み";
 localStorage.setItem("dayOverrides",JSON.stringify(dayOverrides));
 closeModal();
 render();
}

function clearDayOverride(){
 delete dayOverrides[fmt(selectedDate)];
 localStorage.setItem("dayOverrides",JSON.stringify(dayOverrides));
 closeModal();
 render();
}

function resetAll(){
 if(confirm("すべての変更を削除しますか？")){
   weekOverrides={};
   dayOverrides={};
   localStorage.removeItem("weekOverrides");
   localStorage.removeItem("dayOverrides");
   render();
 }
}

function changeMonth(n){
 current.setMonth(current.getMonth()+n);
 render();
}

render();
</script>
</body>
</html>
